<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Türkçe">
<title>Türkçe Тренажёр</title>
<style>
:root{--bg:#f5f4f0;--bg2:#fff;--bg3:#ededea;--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a96;--b:rgba(0,0,0,0.1);--b2:rgba(0,0,0,0.18);--gr:#0F6E56;--grb:rgba(15,110,86,0.1);--re:#A32D2D;--reb:rgba(226,75,74,0.08);--r:12px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#242422;--bg3:#2e2e2b;--text:#f0efeb;--text2:#a0a09a;--text3:#666660;--b:rgba(255,255,255,0.1);--b2:rgba(255,255,255,0.18);--grb:rgba(29,158,117,0.15);--reb:rgba(226,75,74,0.12)}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
#app{max-width:480px;margin:0 auto;min-height:100%}
.nav{background:var(--bg2);border-bottom:.5px solid var(--b);padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;height:52px}
.nbk{font-size:15px;color:var(--gr);cursor:pointer;padding:8px 0}
.nt{font-size:15px;font-weight:500;flex:1}
.ns{font-size:11px;color:var(--text3)}
.home{padding:20px 16px}
.hero h1{font-size:26px;font-weight:600;margin-bottom:4px}
.hero p{font-size:14px;color:var(--text2);margin-bottom:24px}
.sgrid{display:flex;flex-direction:column;gap:10px}
.scard{background:var(--bg2);border:.5px solid var(--b);border-radius:var(--r);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px}
.scard:active{transform:scale(.98)}
.snum{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--gr);flex-shrink:0}
.scard.done .snum{background:var(--grb)}
.sinfo{flex:1}
.sname{font-size:14px;font-weight:500;margin-bottom:2px}
.sdesc{font-size:12px;color:var(--text2)}
.sprog{font-size:11px;color:var(--text3);margin-top:3px}
.sp{padding:16px}
.mtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.mtabs::-webkit-scrollbar{display:none}
.mtab{padding:6px 14px;border:.5px solid var(--b2);border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;background:var(--bg2);color:var(--text2);flex-shrink:0}
.mtab.on{background:var(--gr);color:#fff;border-color:var(--gr)}
.pb{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:14px}
.pf{height:100%;background:#1D9E75;border-radius:2px;transition:width .35s}
.sr{display:flex;gap:8px;margin-bottom:14px}
.sb{flex:1;background:var(--bg2);border-radius:var(--rs);padding:8px 10px;text-align:center}
.sb .v{font-size:20px;font-weight:600}
.sb .l{font-size:10px;color:var(--text3);margin-top:1px}
.card{background:var(--bg2);border:.5px solid var(--b);border-radius:var(--r);padding:18px;margin-bottom:12px}
.bdg{display:inline-block;font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px;margin-bottom:10px}
.q{font-size:17px;line-height:1.5;margin-bottom:12px}
.hint{font-size:13px;color:var(--text2);margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:var(--rs)}
.hint::before{content:'💡 '}
textarea,input[type=text]{width:100%;padding:10px 12px;font-size:15px;border:1px solid var(--b2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit;outline:none}
textarea{resize:none;min-height:72px}
textarea:focus,input[type=text]:focus{border-color:var(--gr)}
.ok{border-color:var(--gr)!important;background:var(--grb)!important}
.ng{border-color:var(--re)!important;background:var(--reb)!important}
.br{display:flex;gap:8px;margin-top:12px}
.btn{padding:10px 18px;border:1px solid var(--b2);border-radius:var(--rs);font-size:14px;cursor:pointer;background:var(--bg2);color:var(--text);font-family:inherit}
.btn:active{transform:scale(.97)}
.btnp{background:var(--gr);color:#fff;border-color:var(--gr);flex:1;font-weight:500}
.fb{margin-top:10px;padding:10px 12px;border-radius:var(--rs);font-size:14px;display:none}
.fb.show{display:block}
.fbo{background:var(--grb);color:var(--gr)}
.fbn{background:var(--reb);color:var(--re)}
.fba{font-weight:600;margin-top:4px}
.fc{min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer}
.fcw{font-size:30px;font-weight:600;margin-bottom:8px}
.fct{font-size:13px;color:var(--text3)}
.fcr{font-size:24px;font-weight:500;color:var(--gr);margin-bottom:6px}
.fcs{font-size:13px;color:var(--text2)}
.fcb{display:flex;gap:10px;margin-top:12px}
.bno{background:var(--reb);color:var(--re);border-color:transparent}
.byes{background:var(--grb);color:var(--gr);border-color:transparent}
.mcg{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.mco{width:100%;padding:12px 14px;border:1px solid var(--b);border-radius:var(--rs);font-size:14px;cursor:pointer;background:var(--bg2);color:var(--text);text-align:left;font-family:inherit}
.mcok{background:var(--grb)!important;border-color:var(--gr)!important;color:var(--gr)!important}
.mcng{background:var(--reb)!important;border-color:var(--re)!important;color:var(--re)!important}
.fis{font-size:16px;line-height:2.4}
.fii{display:inline-block;width:120px;padding:2px 6px;font-size:15px;border:none;border-bottom:2px solid var(--b2);background:transparent;color:var(--text);font-family:inherit;outline:none;vertical-align:bottom}
.fii:focus{border-bottom-color:var(--gr)}
.done{text-align:center;padding:32px 16px}
.done .em{font-size:52px;margin-bottom:12px}
.done h2{font-size:20px;font-weight:600;margin-bottom:6px}
.done p{font-size:14px;color:var(--text2);margin-bottom:20px}

/* REMINDER SCREEN */
.remind-page{padding:16px;display:none;overflow-y:auto}
.remind-hero{margin-bottom:20px}
.remind-hero h2{font-size:20px;font-weight:600;margin-bottom:4px}
.remind-hero p{font-size:13px;color:var(--text2)}
.rblock{background:var(--bg2);border:.5px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:12px}
.rblock-h{font-size:15px;font-weight:600;color:var(--gr);margin-bottom:6px}
.rblock-body{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6}
.rex{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:.5px solid var(--b);gap:12px}
.rex:last-child{border-bottom:none}
.rex-tr{font-size:14px;font-weight:500;color:var(--text);flex-shrink:0}
.rex-ru{font-size:13px;color:var(--text2);text-align:right}
.btn-start{width:100%;padding:14px;background:var(--gr);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:500;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-start:active{transform:scale(.98)}

/* VERB TRAINER */

/* ===== VERB BLOCK ===== */
.vpage{padding:16px;display:none;overflow-y:auto}
.vtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.vtabs::-webkit-scrollbar{display:none}
.vtab{padding:6px 14px;border:.5px solid var(--b2);border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;background:var(--bg2);color:var(--text2);flex-shrink:0}
.vtab.on{background:var(--gr);color:#fff;border-color:var(--gr)}
.vcard{background:var(--bg2);border:.5px solid var(--b);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer}
.vcard:active{transform:scale(.98)}
.vcard-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.vcard-tr{font-size:17px;font-weight:600}
.vcase{font-size:11px;color:#fff;background:var(--gr);padding:2px 8px;border-radius:10px;flex-shrink:0}
.vcard-ru{font-size:13px;color:var(--text2)}
.vex{font-size:13px;margin-top:8px;padding-top:8px;border-top:.5px solid var(--b);display:none}
.vex.open{display:block}
.vex-tr{color:var(--text);font-weight:500;margin-bottom:2px}
.vex-ru{color:var(--text2)}
.conj-grid{display:grid;grid-template-columns:80px 1fr 1fr 1fr;border:.5px solid var(--b2);border-radius:var(--r);overflow:hidden;margin-bottom:16px;font-size:13px}
.conj-hd{background:var(--gr);color:#fff;padding:7px 6px;font-size:11px;font-weight:500;text-align:center}
.conj-hd:first-child{text-align:left;padding-left:10px}
.conj-p{background:var(--bg3);color:var(--text2);padding:7px 10px;border-top:.5px solid var(--b);font-size:12px}
.conj-pos{padding:7px 6px;border-top:.5px solid var(--b);text-align:center;color:var(--text)}
.conj-neg{padding:7px 6px;border-top:.5px solid var(--b);text-align:center;color:#A32D2D}
.conj-q{padding:7px 6px;border-top:.5px solid var(--b);text-align:center;color:#1a6bb5}
.quiz-stat{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:12px}

/* ===== VERB TRAINER ===== */
.vpage{padding:0;display:none}
.vhome{padding:16px}
.vblock-list{display:flex;flex-direction:column;gap:10px}
.vblock-card{background:var(--bg2);border:.5px solid var(--b);border-radius:var(--r);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px}
.vblock-card:active{transform:scale(.98)}
.vblock-num{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.vblock-info{flex:1}
.vblock-name{font-size:14px;font-weight:500;margin-bottom:2px}
.vblock-desc{font-size:12px;color:var(--text2)}
.vblock-prog{font-size:11px;color:var(--text3);margin-top:3px}
.vexpage{padding:16px;display:none}
.vmtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.vmtabs::-webkit-scrollbar{display:none}
.vmtab{padding:6px 14px;border:.5px solid var(--b2);border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;background:var(--bg2);color:var(--text2);flex-shrink:0}
.vmtab.on{background:var(--gr);color:#fff;border-color:var(--gr)}
.conj-grid{display:grid;grid-template-columns:60px 1fr 1fr 1fr;border:.5px solid var(--b2);border-radius:var(--r);overflow:hidden;margin-bottom:14px;font-size:13px}
.cg-hd{background:var(--gr);color:#fff;padding:7px 5px;font-size:11px;font-weight:500;text-align:center}
.cg-hd:first-child{text-align:left;padding-left:8px}
.cg-p{background:var(--bg3);color:var(--text2);padding:7px 8px;border-top:.5px solid var(--b);font-size:12px}
.cg-pos{padding:7px 5px;border-top:.5px solid var(--b);text-align:center}
.cg-neg{padding:7px 5px;border-top:.5px solid var(--b);text-align:center;color:#A32D2D}
.cg-q{padding:7px 5px;border-top:.5px solid var(--b);text-align:center;color:#1a6bb5;font-size:12px}
.vrule{background:var(--bg2);border:.5px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:12px}
.vrule-h{font-size:15px;font-weight:600;color:var(--gr);margin-bottom:6px}
.vrule-b{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.vrule-ex{display:flex;justify-content:space-between;padding:5px 0;border-top:.5px solid var(--b);gap:12px}
.vrule-ex:first-of-type{border-top:none}
.vrule-tr{font-size:14px;font-weight:500}
.vrule-ru{font-size:13px;color:var(--text2)}
</style>
</head>

<div class="nav">
  <span class="nbk" id="nbk" onclick="goHome()" style="display:none">← Разделы</span>
  <div style="flex:1"><div class="nt" id="nt">Türkçe Тренажёр</div><div class="ns" id="ns">Оганова, Часть 1</div></div>
</div>
<div class="home" id="hp"><div class="hero"><h1>Türkçe 🇹🇷</h1><p>Тренажёр по учебнику Огановой — Разделы 1–13</p></div><div class="sgrid" id="sg"></div></div>
<div class="sp" id="sp" style="display:none"><div class="mtabs" id="mt"></div><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div><div class="sr"><div class="sb"><div class="v" id="so">0</div><div class="l">Верно</div></div><div class="sb"><div class="v" id="se">0</div><div class="l">Ошибок</div></div><div class="sb"><div class="v" id="sl">—</div><div class="l">Осталось</div></div></div><div id="ea"></div></div>

<div class="remind-page" id="rpage">

  </div>

  <div class="vtabs" id="vtabs"></div>
  <div id="varea"></div>
</div>


<div class="vpage" id="vpage">
  <div class="vhome" id="vhome">
    <div style="margin-bottom:20px">
      <div style="font-size:20px;font-weight:600;margin-bottom:4px">Глаголы 🔤</div>
      <div style="font-size:13px;color:var(--text2)">Управление и спряжение — 80+ глаголов</div>
    </div>
    <div class="vblock-list" id="vblist"></div>

  <div class="vexpage" id="vexpage">

      <div style="font-size:12px;color:var(--text2)" id="vex-sub"></div>
    </div>
    <div class="vmtabs" id="vmtabs"></div>
    <div class="pb"><div class="pf" id="vpf" style="width:0%"></div></div>
    <div class="sr">
      <div class="sb"><div class="v" id="vok">0</div><div class="l">Верно</div></div>
      <div class="sb"><div class="v" id="verr">0</div><div class="l">Ошибок</div></div>
      <div class="sb"><div class="v" id="vleft">—</div><div class="l">Осталось</div></div>
    </div>
    <div id="vea"></div>
  </div>
</div>
</div>
</div>

let cs=null,cm='c',q=[],ix=0,ok=0,er=0,ans=false,fl=false;
const pr=JSON.parse(localStorage.getItem('tp')||'{}');

function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function nr(s){return s.trim().toLowerCase().replace(/[?.!,;–]/g,'').replace(/\s+/g,' ');}
function $id(id){return document.getElementById(id);}

function goHome(){
  $id('hp').style.display='block';$id('sp').style.display='none';$id('rpage').style.display='none';$id('vpage').style.display='none';
  $id('nbk').style.display='none';$id('nt').textContent='Türkçe Тренажёр';$id('ns').textContent='Оганова, Часть 1';
  renderHome();
}

function renderHome(){
  var vbtn='<div class="scard" onclick="openVerbs()" style="background:linear-gradient(135deg,#0F6E56,#1D9E75);border-color:transparent">'
    +'<div class="vblock-num" style="background:rgba(255,255,255,0.2);color:#fff;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🔤</div>'
    +'<div class="vblock-info"><div class="vblock-name" style="color:#fff">Глаголы — спряжение и управление</div>'
    +'<div class="vblock-desc" style="color:rgba(255,255,255,0.8)">7 блоков • 80+ глаголов из приложений Огановой</div></div>'
    +'<div style="color:rgba(255,255,255,0.7);font-size:20px">›</div></div>';
  $id('sg').innerHTML=vbtn+D.map(s=>{
    const p=pr[s.id]||{};
    const tot=Object.values(p).reduce((a,v)=>a+(v.ok||0),0);
    return`<div class="scard${tot>4?' done':''}" onclick="showReminder(${s.id})">
      <div class="snum">${s.id}</div>
      <div class="sinfo"><div class="sname">${s.nm}</div><div class="sdesc">${s.ds}</div>${tot>0?`<div class="sprog">✓ ${tot} верных ответов</div>`:''}</div>
      <div style="color:var(--text3);font-size:20px">›</div>
    </div>`;
  }).join('');
}

function openSection(id){
  cs=D.find(s=>s.id===id);cm='c';ix=0;ok=0;er=0;ans=false;fl=false;
  $id('hp').style.display='none';$id('sp').style.display='block';
  $id('nbk').style.display='block';$id('nt').textContent=cs.nm;$id('ns').textContent=cs.ds;
  tabs();initQ();upd();render();
}

function tabs(){
  const ms=[['c','Карточки'],['tr','Перевод'],['f','Пропуски'],['m','Выбор']];
  $id('mt').innerHTML=ms.map(([k,l])=>`<button class="mtab${k===cm?' on':''}" onclick="sw('${k}')">${l}</button>`).join('');
}

function sw(m){cm=m;ix=0;ok=0;er=0;ans=false;fl=false;tabs();initQ();upd();render();}

function initQ(){
  if(cm==='c')q=sh(cs.c||[]);
  else if(cm==='tr')q=sh(cs.tr||[]);
  else if(cm==='f')q=sh(cs.f||[]);
  else q=sh(cs.m||[]);
}

function upd(){
  $id('so').textContent=ok;$id('se').textContent=er;
  $id('sl').textContent=Math.max(0,q.length-ix);
  $id('pf').style.width=(q.length>0?Math.round(ix/q.length*100):0)+'%';
}

function sav(){
  if(!pr[cs.id])pr[cs.id]={};
  pr[cs.id][cm]={ok,er,ts:Date.now()};
  localStorage.setItem('tp',JSON.stringify(pr));
}

function render(){
  if(ix>=q.length&&q.length>0){
    sav();
    const p=Math.round(ok/(ok+er)*100)||0;
    $id('ea').innerHTML=`<div class="done"><div class="em">${p>=80?'🎉':'💪'}</div><h2>${p>=80?'Отлично!':'Продолжай!'}</h2><p>Верно: ${ok} из ${ok+er} (${p}%)</p><button class="btn btnp" onclick="rst()">Повторить</button></div>`;
    return;
  }
  if(cm==='c')rCard();
  else if(cm==='tr')rTr();
  else if(cm==='f')rFill();
  else rMC();
}

function rst(){ix=0;ok=0;er=0;ans=false;fl=false;sh(q);upd();render();}

function rCard(){
  const it=q[ix];fl=false;
  $id('ea').innerHTML=`
    <div class="card" id="fc" onclick="flip()" style="cursor:pointer;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
      <div class="bdg">${it.t||''}</div>
      <div id="fc-front">
        <div class="fcw">${it.tr}</div>
        <div class="fct">нажмите, чтобы перевести</div>
      </div>
      <div id="fc-back" style="display:none">
        <div class="fcr">${it.ru}</div>
        <div class="fcs">${it.tr}</div>
      </div>
    </div>
    <div id="fc-btns" style="display:none;gap:10px;margin-top:12px">
      <button class="btn bno" onclick="ca(false)">Не знал</button>
      <button class="btn byes" onclick="ca(true)">Знал ✓</button>
    </div>`;
}


function flip(){
  if(fl)return;fl=true;
  $id('fc-front').style.display='none';
  $id('fc-back').style.display='block';
  $id('fc-btns').style.display='flex';
}


function ca(k){if(k)ok++;else er++;ix++;upd();render();}

function rTr(){
  const it=q[ix];ans=false;
  $id('ea').innerHTML=`<div class="card"><div class="bdg">${it.t||''}</div><div class="q">${it.ru}</div>${it.hint?`<div class="hint">${it.hint}</div>`:''}<textarea id="ai" placeholder="Введите перевод на турецком..." rows="3"></textarea><div class="br"><button class="btn" onclick="skip()">Пропустить</button><button class="btn btnp" id="cb" onclick="chkT()">Проверить</button></div><div class="fb" id="fb"></div></div>`;
  const ta=$id('ai');
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chkT();}});
  ta.focus();
}

function chkT(){
  if(ans){nx();return;}
  const it=q[ix];const val=$id('ai').value;const fb=$id('fb');const ta=$id('ai');
  const c=nr(val)===nr(it.tr);
  fb.className='fb show '+(c?'fbo':'fbn');
  if(c){fb.innerHTML='✓ Верно!';ta.classList.add('ok');ok++;}
  else{fb.innerHTML=`✗ Не совсем.<div class="fba">Правильно: ${it.tr}</div>`;ta.classList.add('ng');er++;}
  ans=true;$id('cb').textContent='Далее →';upd();
}

function rFill(){
  const it=q[ix];ans=false;
  $id('ea').innerHTML=`<div class="card"><div class="bdg">${it.t||''}</div><div class="q" style="font-size:14px;color:var(--text2);margin-bottom:10px">${it.ru}</div><div class="fis">${it.b} <input type="text" class="fii" id="bi" placeholder="?" autocomplete="off" autocorrect="off" spellcheck="false"> ${it.a}</div>${it.h?`<div class="hint" style="margin-top:10px">${it.h}</div>`:''}<div class="br"><button class="btn" onclick="skip()">Пропустить</button><button class="btn btnp" id="cb" onclick="chkF()">Проверить</button></div><div class="fb" id="fb"></div></div>`;
  const inp=$id('bi');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')chkF();});
  inp.focus();
}

function chkF(){
  if(ans){nx();return;}
  const it=q[ix];const val=$id('bi').value;const fb=$id('fb');const inp=$id('bi');
  const c=nr(val)===nr(it.bl);
  fb.className='fb show '+(c?'fbo':'fbn');
  if(c){fb.innerHTML='✓ Верно!';inp.style.borderBottomColor='var(--gr)';ok++;}
  else{fb.innerHTML=`✗ Не совсем.<div class="fba">Правильно: ${it.bl}</div>`;inp.style.borderBottomColor='var(--re)';er++;}
  ans=true;$id('cb').textContent='Далее →';upd();
}

function rMC(){
  const it=q[ix];ans=false;
  const sh2=sh([...it.o]);const cor=it.o[it.c];
  $id('ea').innerHTML=`<div class="card"><div class="bdg">${it.t||''}</div><div class="q">${it.q}</div><div class="mcg">${sh2.map(o=>`<button class="mco" onclick="chkM(this,'${o.replace(/'/g,"\\'")}','${cor.replace(/'/g,"\\'")}')"> ${o}</button>`).join('')}</div><div class="fb" id="fb"></div></div>`;
}

function chkM(el,ch,cor){
  if(ans)return;ans=true;
  const fb=$id('fb');
  document.querySelectorAll('.mco').forEach(b=>{b.onclick=null;if(b.textContent.trim()===cor.trim())b.className='mco mcok';});
  if(ch.trim()===cor.trim()){el.className='mco mcok';ok++;fb.className='fb show fbo';fb.innerHTML='✓ Верно!';}
  else{el.className='mco mcng';er++;fb.className='fb show fbn';fb.innerHTML=`✗ Неверно. Правильно: <strong>${cor}</strong>`;}
  upd();setTimeout(()=>{ix++;ans=false;upd();render();},1600);
}

function skip(){ix++;ans=false;upd();render();}
function nx(){ix++;ans=false;upd();render();}

const REMINDERS = {
  1: {"title":"Раздел 1","blocks":[{"h":"Именное сказуемое","body":"В турецком нет глагола «быть» в настоящем времени. Прилагательное или существительное просто ставится после подлежащего:","ex":[["Otel uzak.","Отель далеко."],["Hava soğuk.","Погода холодная."],["Kitap çok ilginç.","Книга очень интересная."]]},{"h":"Указательные местоимения bu / şu / o","body":"bu = это/этот/эта (рядом), şu = вон тот (чуть дальше), o = тот (далеко или уже известный):","ex":[["Bu kitap.","Это книга."],["Şu sözlük.","Вон тот словарь."],["O adam kim?","Кто тот человек?"]]},{"h":"Существование: var / yok","body":"var = есть, yok = нет. Ставятся в конце предложения. Вопрос: var mı?","ex":[["Kitap var.","Книга есть."],["Arabası yok.","Машины нет."],["Zaman var mı?","Есть время?"]]},{"h":"Множественное число: -lAr","body":"Аффикс -lar / -ler. После твёрдых гласных (a, ı, o, u) → -lar, после мягких (e, i, ö, ü) → -ler:","ex":[["kitap → kitaplar","книга → книги"],["öğrenci → öğrenciler","студент → студенты"],["oda → odalar","комната → комнаты"]]}]},
  2: {"title":"Раздел 2","blocks":[{"h":"Аффиксы сказуемости (личные окончания)","body":"Чтобы сказать «я врач», «ты студент» — добавляем аффикс к именной части. После гласной -yIm, после согласной -Im:","ex":[["Ben öğrenciyim.","Я студент."],["Sen doktorsun.","Ты врач."],["Biz mühendisiz.","Мы инженеры."]]},{"h":"Отрицание: değil","body":"Отрицание именного сказуемого — слово değil. Аффикс лица ставится после değil:","ex":[["O doktor değil.","Он не врач."],["Ben öğrenci değilim.","Я не студент."],["Biz burada değiliz.","Мы здесь не находимся."]]},{"h":"Двухаффиксный изафет: A'nın B'si","body":"«Книга студента» = öğrencinin kitabı. Первое слово получает родительный (-nIn), второе — притяжательный аффикс (-I, -ı, -u, -ü):","ex":[["öğrencinin kitabı","книга студента"],["Türkiye'nin başkenti","столица Турции"],["arkadaşımın arabası","машина моего друга"]]},{"h":"Одноаффиксный изафет: A + B'si","body":"Когда первое слово не имеет аффикса родительного падежа — только второе получает притяжательный. Часто в составных словах:","ex":[["sınıf arkadaşı","одноклассник"],["ders kitabı","учебник"],["Türkçe dersi","урок турецкого"]]}]},
  3: {"title":"Раздел 3","blocks":[{"h":"Настоящее время: -(I)yor","body":"Суффикс -yor присоединяется к основе глагола. Если основа на гласную — гласная отбрасывается. Личные окончания: -um, -sun, —, -uz, -sunuz, -lar:","ex":[["gel-iyor-um → geliyorum","я прихожу/иду"],["yaz-ıyor-sun → yazıyorsun","ты пишешь"],["çalış-ıyor → çalışıyor","он работает"]]},{"h":"Отрицание настоящего: -mIyor","body":"Между основой и -yor вставляем -mı/-mi/-mu/-mü в зависимости от последней гласной основы:","ex":[["gel-mi-yor-um → gelmiyorum","я не прихожу"],["çalış-mı-yor → çalışmıyor","он не работает"],["bil-mi-yor-uz → bilmiyoruz","мы не знаем"]]},{"h":"Повелительное наклонение","body":"2л.ед. = чистая основа. 2л.мн. = основа + -In. Отрицание: -mA (ед.) и -mAyIn (мн.):","ex":[["gel! / gelin!","иди! / идите!"],["yaz! / yazın!","пиши! / пишите!"],["gelme! / gelmeyin!","не ходи! / не ходите!"]]},{"h":"Модальность: lazım / gerek","body":"«Нужно» по-турецки — слова lazım или gerek. Тот, кому нужно — в дательном падеже (-a/-e):","ex":[["Bana yardım lazım.","Мне нужна помощь."],["Sana para gerek mi?","Тебе нужны деньги?"],["Ona zaman lazım.","Ему нужно время."]]}]},
  4: {"title":"Раздел 4","blocks":[{"h":"Система падежей турецкого языка","body":"Турецкий — язык с падежами. Четыре основных пространственных падежа и их вопросы:","ex":[["-da/-de: okulda","местный — где? (в школе)"],["-a/-e: okula","дательный — куда? (в школу)"],["-dan/-den: okuldan","исходный — откуда? (из школы)"],["-(y)ı/-i: okulu","винительный — что именно? (школу)"]]},{"h":"Закон сингармонизма (гласных)","body":"Гласная аффикса зависит от последней гласной слова. A-группа (a, ı, o, u) → A; E-группа (e, i, ö, ü) → E:","ex":[["masa → masada","стол → на столе"],["ev → evde","дом → в доме"],["okul → okulda","школа → в школе"]]},{"h":"Конструкции цели: için / amacıyla / üzere","body":"Все три означают «чтобы / с целью», но için самый частый. Ставятся после инфинитива на -mAk:","ex":[["Türkçe öğrenmek için geldim.","Я приехал, чтобы учить турецкий."],["toplantı amacıyla","с целью встречи"],["geri dönmemek üzere","чтобы не вернуться"]]},{"h":"Инфинитив в падежах (-mAk)","body":"Инфинитив может склоняться как существительное. Самые частые формы:","ex":[["okumayı seviyorum","я люблю читать (-mAyI + sevmek)"],["çalışmaya başladım","я начал работать (-mAyA başlamak)"],["sigara içmekten nefret ederim","я ненавижу курение (-mAktAn)"]]}]},
  5: {"title":"Раздел 5","blocks":[{"h":"Прошедшее время: -DI","body":"Аффикс -dı/-di/-du/-dü (после глухих согласных -tı/-ti). Личные окончания: -m, -n, —, -k, -nız, -lar:","ex":[["git-ti-m → gittim","я пошёл"],["yaz-dı → yazdı","он написал"],["gel-di-k → geldik","мы пришли"]]},{"h":"Отрицание прошедшего: -meDI","body":"Перед аффиксом -DI вставляем -me/-ma:","ex":[["gitmedim","я не пошёл"],["yazmadın","ты не написал"],["gelmediler","они не пришли"]]},{"h":"Специальный вопрос","body":"Вопросительное слово ставится перед глаголом. Порядок слов: подлежащее — вопр. слово — глагол:","ex":[["Ne zaman geldin?","Когда ты пришёл?"],["Nerede oturuyorsunuz?","Где вы живёте?"],["Neden gitmedin?","Почему ты не пошёл?"]]},{"h":"Прошедшее именное сказуемое: -ydI","body":"«Я был студентом» — к именному сказуемому добавляем -ydı/-ydi/-ydu/-ydü + личный аффикс:","ex":[["Öğrenciydim.","Я был студентом."],["Evde değildi.","Его не было дома."],["Hasta mıydın?","Ты был болен?"]]}]},
  6: {"title":"Раздел 6","blocks":[{"h":"Послелог için (для / чтобы)","body":"Ставится после имени существительного или инфинитива. Самый универсальный послелог:","ex":[["Sen için aldım.","Я купил для тебя."],["Dinlenmek için oturdum.","Я сел, чтобы отдохнуть."],["Bu iş için zaman lazım.","Для этой работы нужно время."]]},{"h":"Послелоги gibi и kadar","body":"gibi = как/подобно (сравнение). kadar = до/настолько...как (предел или равенство):","ex":[["Aslan gibi güçlü.","Сильный как лев."],["Sana kadar geldim.","Я дошёл до тебя."],["O kadar güzel ki!","Настолько красиво!"]]},{"h":"Послелог beri (с какого-то времени)","body":"beri = с (момента). Требует исходного падежа (-dan/-den) у предшествующего слова:","ex":[["Sabahtan beri bekliyorum.","Жду с утра."],["İki yıldır buradayım.","Я здесь уже два года."],["O günden beri görmedim.","С того дня не видел."]]},{"h":"hakkında, olarak, göre","body":"hakkında = о/насчёт. olarak = как/в качестве. göre = по/согласно — требует дательного:","ex":[["Bu film hakkında ne düşünüyorsun?","Что ты думаешь об этом фильме?"],["Müdür olarak çalışıyor.","Работает как директор."],["Bana göre doğru.","По-моему, правильно."]]}]},
  7: {"title":"Раздел 7","blocks":[{"h":"Желательное наклонение (-AyIm / -AlIm)","body":"1л.ед. -AyIm = «дай-ка я...», 1л.мн. -AlIm = «давайте...». Выражают намерение или предложение:","ex":[["Bir bakayım.","Дай-ка я посмотрю."],["Sinemaya gidelim.","Давайте пойдём в кино."],["Sana yardım edeyim mi?","Помочь тебе?"]]},{"h":"Повелительное наклонение 3-го лица","body":"3л.ед. = основа + -sIn, 3л.мн. = основа + -sInlar. Значение «пусть он/они»:","ex":[["Gelsin.","Пусть придёт."],["Bilsinler.","Пусть знают."],["Ahmet arasın beni.","Пусть Ахмед мне позвонит."]]},{"h":"Числительные: образование","body":"Числа от 11 до 19: on + единицы. Десятки: yirmi, otuz, kırk, elli, altmış, yetmiş, seksen, doksan:","ex":[["on beş → 15","on + beş"],["yirmi üç → 23","yirmi + üç"],["iki yüz kırk beş → 245","iki yüz + kırk + beş"]]}]},
  8: {"title":"Раздел 8","blocks":[{"h":"Который час: saat kaç?","body":"Полный час: saat beş (5:00). Половина: saat beş buçuk (5:30). После получасА: saat beşi yirmi geçe (5:20). До часа: saat altıya on kala (5:50):","ex":[["Saat üç.","Три часа ровно."],["Saat dört buçuk.","Половина пятого (4:30)."],["Saat beşi çeyrek geçe.","Четверть шестого (5:15)."]]},{"h":"В котором часу: saat kaçta?","body":"Чтобы сказать «в котором часу» — добавляем местный падеж -da/-de к числу часов:","ex":[["Saat dokuzda başlıyor.","Начинается в девять."],["Saat yedide buluşalım.","Давайте встретимся в семь."],["Saat ikide geldim.","Я пришёл в два."]]},{"h":"Дни недели и месяцы","body":"Дни: pazartesi (пн), salı (вт), çarşamba (ср), perşembe (чт), cuma (пт), cumartesi (сб), pazar (вс). Месяцы — заимствованы из европейских языков:","ex":[["Bu hafta çarşamba.","В эту среду."],["Ocak, Şubat, Mart...","Январь, февраль, март..."],["Geçen cuma.","В прошлую пятницу."]]}]},
  9: {"title":"Раздел 9","blocks":[{"h":"Степени сравнения","body":"Сравнительная: daha + прилагательное. Превосходная: en + прилагательное. «Чем X»: X'tan/X'den daha:","ex":[["daha büyük","больше / крупнее"],["en büyük","самый большой"],["İstanbul Ankara'dan daha büyük.","Стамбул больше Анкары."]]},{"h":"Будущее категорическое время: -(y)AcAk","body":"Аффикс -acak/-ecek. Личные окончания: -ım, -sın, —, -ız, -sınız, -lar. Используется для конкретных будущих действий:","ex":[["gideceğim","я пойду"],["yazacak mısın?","ты напишешь?"],["Yarın gelmeyecekler.","Они завтра не придут."]]},{"h":"Настоящее-будущее время: -(I)r / -Ar","body":"Выражает регулярные/обычные действия, вечные истины, а также план/намерение. Основа + -ar/-er/-ır/-ir/-ur/-ür:","ex":[["Her sabah kahve içerim.","Каждое утро я пью кофе."],["Güneş doğudan doğar.","Солнце встаёт на востоке."],["Yarın gelirim.","Завтра приду (как правило или в плане)."]]}]},
  10: {"title":"Раздел 10","blocks":[{"h":"Форма возможности: -(y)Abil","body":"Возможность/умение: основа + -abil/-ebil. Перед личными аффиксами ведёт себя как обычный глагол:","ex":[["gidebilirim","я могу пойти"],["Türkçe konuşabiliyorum.","Я умею говорить по-турецки."],["Yardım edebilir misin?","Можешь помочь?"]]},{"h":"Форма невозможности: -(y)AmA","body":"Невозможность: основа + -ama/-eme. В настоящем: -amıyor/-emiyor:","ex":[["gidemiyorum","я не могу идти (сейчас)"],["anlayamıyorum","я не понимаю / не могу понять"],["Yapamam.","Я не могу этого сделать."]]},{"h":"Прошедшее субъективное: -mIş","body":"Используется когда говорящий не был очевидцем события — пересказ, удивление, вывод по косвенным признакам:","ex":[["Meğer hasta olmuş.","Оказывается, он заболел."],["Galiba gitmiş.","Кажется, он ушёл."],["Çok yorulmuşsun.","Ты, оказывается, очень устал."]]}]},
  11: {"title":"Раздел 11","blocks":[{"h":"Страдательный залог: -(I)l- / -(I)n-","body":"Кто-то делает → что-то делается. Аффикс -ıl/-il/-ul/-ül (или -ın после гласной). Агент (кем) — через tarafından:","ex":[["Kitap yazıldı.","Книга была написана."],["Kapı açıldı.","Дверь открылась / была открыта."],["Bina belediye tarafından yapıldı.","Здание построено муниципалитетом."]]},{"h":"Возвратный залог: -(I)n-","body":"Действие направлено на самого субъекта. Аффикс -ın/-in/-un/-ün после согласной:","ex":[["yıkanmak","мыться (мыть себя)"],["giyinmek","одеваться (одевать себя)"],["Aynaya baktı.","Он посмотрел на себя в зеркало."]]},{"h":"Взаимный и понудительный залоги","body":"Взаимный -(I)ş-: действие совершается друг с другом. Понудительный -DIr-/-t-: заставить кого-то сделать:","ex":[["tanışmak","знакомиться (друг с другом)"],["görüşmek","встречаться / видеться"],["Evi boyattım.","Я дал покрасить дом / велел покрасить."]]}]},
  12: {"title":"Раздел 12","blocks":[{"h":"Причастие настоящего-прошедшего: -(y)An","body":"Образует определение или субстантив. Основа + -an/-en. Отрицание: -mAyAn:","ex":[["gelen adam","приходящий / пришедший человек"],["okuyan öğrenci","читающий студент"],["bilmeyen","тот, кто не знает"]]},{"h":"Субстантивация причастия","body":"Причастие может быть существительным — заменяет целый оборот «тот, кто...». Склоняется как обычное существительное:","ex":[["Gelenler oturdu.","Пришедшие сели."],["Bilenler bilsin.","Кто знает — пусть знает."],["İsteyenler gelsin.","Кто хочет — пусть приходит."]]}]},
  13: {"title":"Раздел 13","blocks":[{"h":"Деепричастие на -(y)Ip","body":"Связывает два действия одного субъекта: первое совершается, затем — второе. Субъект не повторяется. Отрицание: -mAyIp (не сделав — зато сделал другое):","ex":[["Arayıp söyledi.","Позвонил и сказал."],["Kalkıp gitti.","Встал и ушёл."],["Cevap vermeyip çıktı.","Не ответив, вышел."]]},{"h":"Конструкция одновременности: -Arken / -(I)ken","body":"«Пока / когда». -Arken присоединяется к основе наст.-буд. времени. -(I)ken — к именам и другим формам:","ex":[["Çalışırken müzik dinliyorum.","Пока работаю, слушаю музыку."],["Evdeyken aramadın.","Пока я был дома, ты не звонил."],["Çıkarken kapıyı kilitle.","Когда будешь выходить, запри дверь."]]}],
14: {"title":"Раздел 14","blocks":[
  {"h":"Прошедшее длительное: -(I)yordu","body":"Описывает действие в процессе в прошлом — фон, на котором произошло другое событие. Образуется: основа + -ıyor/-iyor/-uyor/-üyor + -du/-dü:","ex":[["Kitap okuyordum, telefon çaldı.","Я читал книгу, (тут) зазвонил телефон."],["Dün yağmur yağıyordu.","Вчера шёл дождь (весь день)."],["Ne yapıyordun?","Что ты делал?"]]},
  {"h":"Имперфект: -ArdI (eskiden, çocukken)","body":"Выражает регулярное действие в прошлом — «бывало, раньше...». Характерные слова: eskiden (раньше), çocukken (в детстве), bazen (иногда):","ex":[["Eskiden her gün spor yapardım.","Раньше я каждый день занимался спортом."],["Çocukken çok kitap okurdum.","В детстве я много читал."],["Hiç geç kalmazdı.","Бывало, никогда не опаздывал."]]},
  {"h":"Давнопрошедшее: -mIştI","body":"Действие, завершившееся до другого прошедшего события. «Уже сделал к тому моменту»:","ex":[["Sen geldiğinde o çoktan gitmişti.","Когда ты пришёл, он уже ушёл."],["Filmi daha önce görmüştüm.","Я видел этот фильм раньше."],["Kapıyı kilitlemişti.","Он уже запер дверь (к тому времени)."]]}
]},
15: {"title":"Раздел 15","blocks":[

function showReminder(id){
  const sec = D.find(s=>s.id===id);
  const rem = REMINDERS[id];
  // Hide all pages
  $id('hp').style.display='none';
  $id('sp').style.display='none';
  $id('rpage').style.display='block';
  $id('nbk').style.display='block';
  $id('nt').textContent = sec.nm;
  $id('ns').textContent = 'Напоминание';
  // Store pending section
  window._pendingSection = id;
  // Render blocks
  if(rem){
    $id('r-title').textContent = rem.title + ' — Правила';
    $id('r-blocks').innerHTML = rem.blocks.map(b=>
      `<div class="rblock">
        <div class="rblock-h">${b.h}</div>
        <div class="rblock-body">${b.body}</div>
        ${b.ex.map(e=>`<div class="rex"><span class="rex-tr">${e[0]}</span><span class="rex-ru">${e[1]}</span></div>`).join('')}
      </div>`
    ).join('');
  } else {
    $id('r-blocks').innerHTML = '<p style="color:var(--text2);font-size:14px">Напоминание для этого раздела пока не добавлено.</p>';
  }
}

function startExercises(){
  $id('rpage').style.display='none';
  openSection(window._pendingSection);
}

var PERS=['Ben','Sen','O','Biz','Siz','Onlar'];
var vPR=JSON.parse(localStorage.getItem('vpr')||'{}');
var vCurBlock=null,vCurMode='cards',vQ=[],vIx=0,vOk=0,vEr=0,vAns=false,vFl=false,vConjV=0;

function openVerbs(){
  $id('hp').style.display='none';$id('sp').style.display='none';
  $id('rpage').style.display='none';$id('vpage').style.display='block';
  $id('nbk').style.display='block';
  $id('nt').textContent='Глаголы';$id('ns').textContent='Управление и спряжение';
  showVHome();
}

function showVHome(){
  $id('vhome').style.display='block';
  $id('vexpage').style.display='none';
  $id('nt').textContent='Глаголы';
  $id('ns').textContent='Управление и спряжение';
  var html='';
  VBLOCKS.forEach(function(b){
    var p=vPR[b.id]||{},tot=Object.values(p).reduce(function(a,v){return a+(v.ok||0);},0);
    html+='<div class="vblock-card" onclick="openVBlock(this.dataset.id)" data-id="'+b.id+'">'
      +'<div class="vblock-num" style="background:'+b.color+'22;color:'+b.color+'">'+b.icon+'</div>'
      +'<div class="vblock-info"><div class="vblock-name">'+b.name+'</div>'
      +'<div class="vblock-desc">'+b.desc+'</div>'
      +(tot>0?'<div class="vblock-prog">✓ '+tot+' верных</div>':'')
      +'</div><div style="color:var(--text3);font-size:20px">›</div></div>';
  });
  $id('vblist').innerHTML=html;
}


function openVBlock(id){
  vCurBlock=VBLOCKS.find(function(b){return b.id===id;});
  vCurMode='rule';vIx=0;vOk=0;vEr=0;vAns=false;vFl=false;vConjV=0;
  $id('vhome').style.display='none';
  $id('vexpage').style.display='block';
  $id('nt').textContent=vCurBlock.name;
  $id('ns').textContent=vCurBlock.desc;
  renderVMTabs();renderVEx();
}

function renderVMTabs(){
  var b=vCurBlock;
  var tabs=[['rule','Правило'],['cards','Карточки'],['fill','Пропуски'],['translate','Перевод'],['mc','Выбор']];
  if(b.conj) tabs.push(['conj','Спряжение']);
  $id('vmtabs').innerHTML=tabs.map(function(t){
    return '<button class="vmtab'+(t[0]===vCurMode?' on':'')+'" onclick="setVMode(\''+t[0]+'\')">'+t[1]+'</button>';
  }).join('');
}

function setVMode(m){vCurMode=m;vIx=0;vOk=0;vEr=0;vAns=false;vFl=false;renderVMTabs();renderVEx();}

function initVQ(){
  var b=vCurBlock;
  if(vCurMode==='cards') vQ=sh(b.cards.map(function(c){return {tr:c[0],ru:c[1]};}));
  else if(vCurMode==='fill') vQ=sh(b.fill);
  else if(vCurMode==='translate') vQ=sh(b.translate);
  else if(vCurMode==='mc') vQ=sh(b.mc);
}

function updV(){
  $id('vok').textContent=vOk;$id('verr').textContent=vEr;
  $id('vleft').textContent=Math.max(0,vQ.length-vIx);
  $id('vpf').style.width=(vQ.length>0?Math.round(vIx/vQ.length*100):0)+'%';
}

function savVPR(){
  if(!vPR[vCurBlock.id])vPR[vCurBlock.id]={};
  vPR[vCurBlock.id][vCurMode]={ok:vOk,err:vEr};
  localStorage.setItem('vpr',JSON.stringify(vPR));
}

function renderVEx(){
  var b=vCurBlock,area=$id('vea');
  $id('vpf').style.width='0%';
  $id('vok').textContent='0';$id('verr').textContent='0';$id('vleft').textContent='—';

  if(vCurMode==='rule'){
    var r=b.rule;
    var exhtml=r.ex.map(function(e){
      return '<div class="vrule-ex"><span class="vrule-tr">'+e[0]+'</span><span class="vrule-ru">'+e[1]+'</span></div>';
    }).join('');
    area.innerHTML='<div class="vrule"><div class="vrule-h">'+r.h+'</div><div class="vrule-b">'+r.b+'</div>'+exhtml+'</div>'
      +'<button class="btn btnp" style="width:100%;margin-top:4px" onclick="setVMode(\'cards\')">Перейти к карточкам →</button>';
    return;
  }
  if(vCurMode==='conj'){renderVConj();return;}

  initVQ();updV();
  if(vIx>=vQ.length&&vQ.length>0){showVDone();return;}
  if(vCurMode==='cards') renderVCard();
  else if(vCurMode==='fill') renderVFill();
  else if(vCurMode==='translate') renderVTr();
  else renderVMC();
}

function showVDone(){
  savVPR();
  var pct=Math.round(vOk/(vOk+vEr)*100)||0;
  $id('vea').innerHTML='<div class="done"><div class="em">'+(pct>=80?'🎉':'💪')+'</div>'
    +'<h2>'+(pct>=80?'Отлично!':'Продолжай!')+'</h2>'
    +'<p>Верно: '+vOk+' из '+(vOk+vEr)+' ('+pct+'%)</p>'
    +'<div style="display:flex;gap:8px;margin-top:4px">'
    +'<button class="btn" style="flex:1" onclick="showVHome()">← Блоки</button>'
    +'<button class="btn btnp" style="flex:1" onclick="rstV()">Повторить</button>'
    +'</div></div>';
}

function rstV(){vIx=0;vOk=0;vEr=0;vAns=false;vFl=false;sh(vQ);updV();renderVEx();}

function renderVCard(){
  var it=vQ[vIx];vFl=false;
  $id('vea').innerHTML='<div class="card" id="vfc" onclick="vFlip()" style="cursor:pointer;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">'
    +'<div id="vfc-f"><div style="font-size:26px;font-weight:600;margin-bottom:8px">'+it.tr+'</div>'
    +'<div style="font-size:13px;color:var(--text3)">нажмите, чтобы перевести</div></div>'
    +'<div id="vfc-b" style="display:none"><div style="font-size:20px;font-weight:500;color:var(--gr);margin-bottom:6px">'+it.ru+'</div>'
    +'<div style="font-size:13px;color:var(--text2)">'+it.tr+'</div></div></div>'
    +'<div id="vfc-btns" style="display:none;gap:10px;margin-top:12px">'
    +'<button class="btn bno" onclick="vCA(false)">Не знал</button>'
    +'<button class="btn byes" onclick="vCA(true)">Знал ✓</button></div>';
}

function vFlip(){
  if(vFl)return;vFl=true;
  $id('vfc-f').style.display='none';$id('vfc-b').style.display='block';
  $id('vfc-btns').style.display='flex';
}
function vCA(k){if(k)vOk++;else vEr++;vIx++;updV();
  if(vIx>=vQ.length)showVDone();else renderVCard();}

function renderVFill(){
  var it=vQ[vIx];vAns=false;
  $id('vea').innerHTML='<div class="card"><div class="bdg">'+vCurBlock.id.toUpperCase()+'</div>'
    +'<div class="q" style="font-size:14px;color:var(--text2);margin-bottom:10px">'+it.ru+'</div>'
    +'<div class="fis">'+it.b+' <input type="text" class="fii" id="vbi" placeholder="?" autocomplete="off" autocorrect="off" spellcheck="false"> '+it.a+'</div>'
    +(it.h?'<div class="hint" style="margin-top:10px">'+it.h+'</div>':'')
    +'<div class="br"><button class="btn" onclick="vSkip()">Пропустить</button>'
    +'<button class="btn btnp" id="vcb" onclick="vChkF()">Проверить</button></div>'
    +'<div class="fb" id="vfb"></div></div>';
  var inp=$id('vbi');
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')vChkF();});
  inp.focus();
}

function vChkF(){
  if(vAns){vNxt();return;}
  var it=vQ[vIx],val=$id('vbi').value,fb=$id('vfb'),inp=$id('vbi');
  var c=nr(val)===nr(it.bl);
  fb.className='fb show '+(c?'fbo':'fbn');
  if(c){fb.innerHTML='✓ Верно!';inp.style.borderBottomColor='var(--gr)';vOk++;}
  else{fb.innerHTML='✗ Не совсем.<div class="fba">Правильно: '+it.bl+'</div>';inp.style.borderBottomColor='var(--re)';vEr++;}
  vAns=true;$id('vcb').textContent='Далее →';updV();
}

function renderVTr(){
  var it=vQ[vIx];vAns=false;
  $id('vea').innerHTML='<div class="card"><div class="bdg">RU → TR</div>'
    +'<div class="q">'+it.ru+'</div>'
    +(it.hint?'<div class="hint">'+it.hint+'</div>':'')
    +'<textarea id="vai" placeholder="Введите перевод на турецком..." rows="3"></textarea>'
    +'<div class="br"><button class="btn" onclick="vSkip()">Пропустить</button>'
    +'<button class="btn btnp" id="vcb" onclick="vChkT()">Проверить</button></div>'
    +'<div class="fb" id="vfb"></div></div>';
  var ta=$id('vai');
  ta.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();vChkT();}});
  ta.focus();
}

function vChkT(){
  if(vAns){vNxt();return;}
  var it=vQ[vIx],val=$id('vai').value,fb=$id('vfb'),ta=$id('vai');
  var c=nr(val)===nr(it.tr);
  fb.className='fb show '+(c?'fbo':'fbn');
  if(c){fb.innerHTML='✓ Верно!';ta.classList.add('ok');vOk++;}
  else{fb.innerHTML='✗ Не совсем.<div class="fba">Правильно: '+it.tr+'</div>';ta.classList.add('ng');vEr++;}
  vAns=true;$id('vcb').textContent='Далее →';updV();
}

function renderVMC(){
  var it=vQ[vIx];vAns=false;
  var cor=it.o[it.c],opts=sh([].concat(it.o));
  var btns=opts.map(function(o){
    return '<button class="mco" onclick="vChkMC(this,\''+o.replace(/'/g,"\\'")+'\',\''+cor.replace(/'/g,"\\'")+'\')"> '+o+'</button>';
  }).join('');
  $id('vea').innerHTML='<div class="card"><div class="bdg">Выбор формы</div>'
    +'<div class="q">'+it.q+'</div>'
    +'<div class="mcg">'+btns+'</div>'
    +'<div class="fb" id="vfb"></div></div>';
}

function vChkMC(el,ch,cor){
  if(vAns)return;vAns=true;
  var fb=$id('vfb');
  document.querySelectorAll('.mco').forEach(function(b){b.onclick=null;if(b.textContent.trim()===cor.trim())b.className='mco mcok';});
  if(ch.trim()===cor.trim()){el.className='mco mcok';vOk++;fb.className='fb show fbo';fb.innerHTML='✓ Верно!';}
  else{el.className='mco mcng';vEr++;fb.className='fb show fbn';fb.innerHTML='✗ Неверно. Правильно: <strong>'+cor+'</strong>';}
  updV();setTimeout(function(){vIx++;vAns=false;updV();if(vIx>=vQ.length)showVDone();else renderVMC();},1600);
}

function renderVConj(){
  var b=vCurBlock,conj=b.conj;
  var vkeys=Object.keys(conj);
  var v=conj[vkeys[vConjV]];
  var vbtns=vkeys.map(function(k,i){
    return '<button class="vmtab'+(i===vConjV?' on':'')+'" style="font-size:11px;padding:4px 10px" onclick="setVConjV('+i+')">'+k+'</button>';
  }).join('');
  var rows=PERS.map(function(p,i){
    return '<div class="cg-p">'+p+'</div><div class="cg-pos">'+v[i][0]+'</div><div class="cg-neg">'+v[i][1]+'</div><div class="cg-q">'+v[i][2]+'</div>';
  }).join('');
  $id('vea').innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+vbtns+'</div>'
    +'<div class="conj-grid">'
    +'<div class="cg-hd">Лицо</div><div class="cg-hd">✓ Утверждение</div><div class="cg-hd">✗ Отрицание</div><div class="cg-hd">? Вопрос</div>'
    +rows+'</div>';
}
function setVConjV(i){vConjV=i;renderVConj();}

function vSkip(){vIx++;vAns=false;updV();if(vIx>=vQ.length)showVDone();else renderVEx();}
function vNxt(){vIx++;vAns=false;updV();if(vIx>=vQ.length)showVDone();else renderVEx();}
// ===== END VERB TRAINER =====

renderHome();
</script>
</body>
</html>
